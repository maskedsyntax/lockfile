name: Release Native Installers

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build Native Package
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        
      - name: Get Version
        id: get_version
        shell: bash
        run: |
          VERSION=$(./gradlew properties -q | grep "^version: " | awk '{print $2}')
          echo "PROJECT_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build and InstallDist
        run: ./gradlew installDist

      - name: Install Packaging Tools (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y fakeroot rpm

      - name: Package Windows (.exe)
        if: runner.os == 'Windows'
        run: |
          jpackage --type exe --dest output --name Lockfile --app-version 1.0.0 --input build/install/lockfile/lib --main-jar lockfile-${{ env.PROJECT_VERSION }}.jar --main-class com.maskedsyntax.lockfile.Main --win-shortcut --win-menu

      - name: Package macOS (.dmg)
        if: runner.os == 'macOS'
        run: |
          jpackage --type dmg --dest output --name Lockfile --app-version 1.0.0 --input build/install/lockfile/lib --main-jar lockfile-${{ env.PROJECT_VERSION }}.jar --main-class com.maskedsyntax.lockfile.Main

      - name: Package Linux (.deb & .rpm)
        if: runner.os == 'Linux'
        run: |
          jpackage --type deb --dest output --name lockfile --app-version 1.0.0 --input build/install/lockfile/lib --main-jar lockfile-${{ env.PROJECT_VERSION }}.jar --main-class com.maskedsyntax.lockfile.Main --linux-shortcut
          jpackage --type rpm --dest output --name lockfile --app-version 1.0.0 --input build/install/lockfile/lib --main-jar lockfile-${{ env.PROJECT_VERSION }}.jar --main-class com.maskedsyntax.lockfile.Main --linux-shortcut

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.os }}
          path: output/*

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Generate PKGBUILD for AUR
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          VERSION=${TAG_NAME#v}
          cat <<EOF > PKGBUILD
          pkgname=lockfile-bin
          pkgver=\${VERSION}
          pkgrel=1
          pkgdesc="Secure Desktop Password Manager"
          arch=('x86_64')
          url="https://github.com/${{ github.repository }}"
          license=('MIT')
          depends=('java-runtime>=21')
          source=("\$url/releases/download/\${TAG_NAME}/lockfile_\${VERSION}-1_amd64.deb")
          sha256sums=('SKIP')
          package() {
            tar -xf data.tar.xz -C "\$pkgdir"
          }
          EOF
          
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: output
          pattern: installers-*
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            output/*
            PKGBUILD
